<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Django Blog{% endblock %}</title>
    {% load static %}
    <link rel="stylesheet" type="text/css" href="{% static 'blog/css/style.css' %}">
</head>
<body>
    <header>
        <div class="container">
            <h1><a href="/">My Django Blog</a></h1>
            <nav>
                <a href="/">Home</a>
                <a href="/admin/">Admin</a>
            </nav>
        </div>
    </header>
    
    <main class="container">
        {% block content %}
        <h2>Welcome to Django Blog!</h2>
        <p>Your blog is ready to go. Visit the admin panel to create your first post!</p>
        {% endblock %}
    </main>
    
    <footer class="container">
        <p>&copy; 2024 Django Blog - Built with Django</p>
    </footer>
</body>
</html>
